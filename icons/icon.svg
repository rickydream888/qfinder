<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="55%" stop-color="#6E5BEF"/>
      <stop offset="100%" stop-color="#A24BFF"/>
    </linearGradient>
    <linearGradient id="folderTab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="100%" stop-color="#FFC34D"/>
    </linearGradient>
    <linearGradient id="folderBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD566"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E6F0FF" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="lensShine" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle highlight at top -->
  <rect x="32" y="32" width="960" height="480" rx="220" ry="220" fill="#FFFFFF" opacity="0.06"/>

  <!-- Folder -->
  <g filter="url(#softShadow)">
    <!-- Folder tab -->
    <path d="M 220 330
             L 460 330
             Q 500 330 520 360
             L 560 410
             L 220 410 Z"
          fill="url(#folderTab)"/>
    <!-- Folder body -->
    <rect x="200" y="390" width="624" height="430" rx="48" ry="48" fill="url(#folderBody)"/>
    <!-- Folder front fold highlight -->
    <rect x="200" y="390" width="624" height="40" rx="20" ry="20" fill="#FFFFFF" opacity="0.25"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(560 560)" filter="url(#softShadow)">
    <!-- Handle -->
    <rect x="120" y="120" width="240" height="64" rx="32" ry="32"
          transform="rotate(45 120 120)" fill="#2E3A59"/>
    <rect x="138" y="138" width="200" height="28" rx="14" ry="14"
          transform="rotate(45 120 120)" fill="#4B5A7A" opacity="0.7"/>
    <!-- Lens ring -->
    <circle cx="0" cy="0" r="170" fill="#2E3A59"/>
    <circle cx="0" cy="0" r="140" fill="url(#lens)"/>
    <!-- Lens shine -->
    <circle cx="0" cy="0" r="140" fill="url(#lensShine)"/>
    <ellipse cx="-55" cy="-55" rx="50" ry="28" fill="#FFFFFF" opacity="0.55" transform="rotate(-35 -55 -55)"/>
  </g>
</svg>
